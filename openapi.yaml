openapi: 3.1.0
info:
  title: EvadePlayer API
  version: 2.0.0
  description: |
    REST API for EvadePlayer — an HLS streaming backend.

    ## Authentication

    **Upload** (`POST /videos/upload`) always requires `X-Service-Key` header.

    **Read** endpoints (`GET /videos`, `GET /videos/{id}`, `GET /videos/{id}/status`,
    `GET /videos/{id}/storyboard`, `GET /videos/{id}/segments`) are controlled by
    the `READ_PUBLIC` env variable:
    - `READ_PUBLIC=true` (default) — publicly accessible, no auth needed
    - `READ_PUBLIC=false` — `X-Service-Key` required

    The service key is configured via `SERVICE_KEY` env variable.

    ## HLS playback flow

    1. `GET /videos/{id}` → receive `manifest_url` (pre-signed, 4 h TTL)
    2. Player fetches `manifest_url` → `GET /hls-proxy/{videoID}/master.m3u8?token=…&expires=…`
    3. API rewrites the master manifest:
       - `EXT-X-MEDIA` audio/subtitle URIs → `/hls-proxy/{videoID}/audio/{n}/index.m3u8?…`
       - `EXT-X-STREAM-INF` video variant URIs → `/hls-proxy/{videoID}/{codec}/{quality}/index.m3u8?…`
       - `EXT-X-IMAGE-STREAM-INF` preview sprite URI → `/hls-proxy/{videoID}/images/index.m3u8?…`
       - `EXT-X-MAP` init segments → `/hls/{videoID}/{codec}/{quality}/init.mp4?…`
    4. Player fetches sub-manifests through `/hls-proxy/`, which rewrites segment URLs → `/hls/{videoID}/…`
    5. Segments are served by nginx directly from SeaweedFS; nginx validates
       the token via `GET /internal/validate-hls` before proxying.

    ## Segments

    An optional JSON file can be uploaded alongside the video as the `segments`
    multipart field. It maps arbitrary segment names to `{ start, end }` intervals
    (seconds). Useful for marking intros, credits, ad breaks, etc.

    ```json
    { "intro": { "start": 0, "end": 15 }, "credits": { "start": 3540, "end": 3600 } }
    ```

    Retrieve it later via `GET /videos/{id}/segments`.

    ## Multi-audio tracks and subtitles

    When the source file contains multiple audio tracks or text-based subtitle tracks,
    the transcoder extracts them automatically:

    - **Audio tracks** — each track is encoded as a separate audio-only HLS stream at
      `audio/{typeIndex}/index.m3u8`. The master manifest lists them as
      `EXT-X-MEDIA:TYPE=AUDIO` renditions with `LANGUAGE` and `NAME` from the source.
    - **Subtitles** — text-based tracks (SRT, SSA/ASS, etc.) are converted to WebVTT HLS
      streams at `subs/{typeIndex}/index.m3u8`. Bitmap codecs (PGS, DVDSUB) are skipped.

    `GET /videos/{id}` returns `audio_tracks` and `subtitle_tracks` arrays with per-track
    `index`, `language`, `title`, and a direct `manifest_url` for each track.

    ### Filtering the master manifest

    Append `audio=<index>` and/or `subs=<index>` to `master.m3u8` to receive a manifest
    that contains only the specified track(s). The selected audio track is automatically
    promoted to `DEFAULT=YES`. All three filters (`codec`, `audio`, `subs`) can be combined:

    ```
    /hls-proxy/{videoID}/master.m3u8?codec=h264&audio=3&subs=1&token=…&expires=…
    ```

servers:
  - url: /api
    description: Current host via nginx (relative — works from any deployment)
  - url: http://localhost:8000
    description: Direct API (Go service, no prefix)
  - url: http://localhost
    description: Via nginx (localhost)

tags:
  - name: Videos
    description: Video upload, retrieval and status
  - name: HLS
    description: HLS manifest proxy and signed segment delivery
  - name: Media
    description: Static media files served by nginx
  - name: Internal
    description: Internal endpoints used by nginx (not for clients)

components:
  securitySchemes:
    serviceKeyAuth:
      type: apiKey
      in: header
      name: X-Service-Key
      description: Static service key. Set via `SERVICE_KEY` env variable.

  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
          example: video not found

    VideoStatus:
      type: string
      enum: [pending, processing, ready, failed]

    Segment:
      type: object
      required: [start, end]
      properties:
        start:
          type: number
          format: float
          description: Start time in seconds.
          example: 0
        end:
          type: number
          format: float
          description: End time in seconds.
          example: 15

    Segments:
      type: object
      description: |
        Free-form map of named time intervals. Keys are segment names (e.g. `intro`,
        `credits`, `ad`); values are `{ start, end }` in seconds.
      additionalProperties:
        $ref: '#/components/schemas/Segment'
      example:
        intro:
          start: 0
          end: 15
        credits:
          start: 3540
          end: 3600

    AudioTrack:
      type: object
      required: [index, manifest_url]
      properties:
        index:
          type: integer
          description: Zero-based track index used in `audio/<index>/index.m3u8` paths.
          example: 0
        language:
          type: string
          description: BCP-47 / ISO 639-2 language code from the source file.
          example: rus
        title:
          type: string
          description: Human-readable track name from the source file.
          example: DD 5.1 @ 640 kbps (AVO Goblin)
        manifest_url:
          type: string
          description: Pre-signed URL for the audio-only HLS sub-playlist.
          example: http://localhost/hls-proxy/a1b2c3d4.../audio/0/index.m3u8?token=abc&expires=1700000000

    SubtitleTrack:
      type: object
      required: [index, manifest_url]
      properties:
        index:
          type: integer
          description: Zero-based track index used in `subs/<index>/index.m3u8` paths.
          example: 0
        language:
          type: string
          description: BCP-47 / ISO 639-2 language code from the source file.
          example: eng
        title:
          type: string
          description: Human-readable track name from the source file.
          example: SRT (English)
        manifest_url:
          type: string
          description: Pre-signed URL for the WebVTT HLS sub-playlist.
          example: http://localhost/hls-proxy/a1b2c3d4.../subs/1/index.m3u8?token=abc&expires=1700000000

    Video:
      type: object
      required: [id, status, progress, size_bytes, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/VideoStatus'
        progress:
          type: integer
          description: Transcoding progress 0–100.
          example: 42
        duration:
          type: number
          format: float
          nullable: true
          description: Duration in seconds. Null until transcoding completes.
          example: 3723.5
        width:
          type: integer
          nullable: true
          description: Video width in pixels. Null until transcoding completes.
          example: 1920
        height:
          type: integer
          nullable: true
          description: Video height in pixels. Null until transcoding completes.
          example: 1080
        size_bytes:
          type: integer
          format: int64
          description: Original file size in bytes.
          example: 1073741824
        manifest_url:
          type: string
          nullable: true
          description: |
            Pre-signed HLS master manifest URL. Only present when `status=ready`.
            Token TTL is 4 hours.
          example: http://localhost/hls-proxy/a1b2c3d4.../master.m3u8?token=abc&expires=1700000000
        preview_url:
          type: string
          nullable: true
          description: Preview image URL. Only present when `status=ready`.
          example: http://localhost/thumbnails/a1b2c3d4.../preview.jpg
        audio_tracks:
          type: array
          nullable: true
          description: |
            Audio renditions extracted from the source. Only present when `status=ready`
            and the source contains more than one audio track (or an explicitly named track).
            Use `index` to filter the master manifest via `?audio=<index>`.
          items:
            $ref: '#/components/schemas/AudioTrack'
        subtitle_tracks:
          type: array
          nullable: true
          description: |
            Text-based subtitle tracks (WebVTT) extracted from the source. Only present
            when `status=ready` and the source contains supported subtitle tracks.
            Bitmap-based codecs (PGS, DVDSUB) are skipped.
            Use `index` to filter the master manifest via `?subs=<index>`.
          items:
            $ref: '#/components/schemas/SubtitleTrack'
        error_message:
          type: string
          nullable: true
          description: Set when `status=failed`.
        segments:
          nullable: true
          description: Named time intervals uploaded alongside the video. Null if not provided.
          allOf:
            - $ref: '#/components/schemas/Segments'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    TokenResponse:
      type: object
      required: [token, expires, manifest_url]
      properties:
        token:
          type: string
          description: HMAC-SHA256 token signed with `HLS_TOKEN_SECRET`.
          example: d6fe98fac9c3b065...
        expires:
          type: integer
          format: int64
          description: Unix timestamp after which the token is invalid (4 h TTL).
          example: 1780237413
        manifest_url:
          type: string
          description: Pre-signed HLS master manifest URL ready to pass to a player.
          example: http://localhost/hls-proxy/a1b2c3d4.../master.m3u8?token=abc&expires=1700000000

    VideoListResponse:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Video'
        total:
          type: integer
          description: Total number of videos (for pagination).

    UploadResponse:
      type: object
      required: [id, status]
      properties:
        id:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/VideoStatus'

    StatusResponse:
      type: object
      required: [id, status, progress, updated_at]
      properties:
        id:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/VideoStatus'
        progress:
          type: integer
          example: 42
        error_message:
          type: string
          nullable: true
        updated_at:
          type: string
          format: date-time

    StoryboardCoords:
      type: object
      required: [x, y]
      properties:
        x:
          type: integer
          description: Horizontal offset within the sprite sheet, in pixels.
          example: 320
        y:
          type: integer
          description: Vertical offset within the sprite sheet, in pixels.
          example: 0

    StoryboardCue:
      type: object
      required: [url, start_time, end_time, width, height, coords]
      properties:
        url:
          type: string
          description: URL of the sprite sheet image.
          example: http://localhost/thumbnails/a1b2c3d4.../sprite.jpg
        start_time:
          type: number
          format: float
          description: Start of the interval in seconds.
          example: 10
        end_time:
          type: number
          format: float
          description: End of the interval in seconds. Clamped to video duration on last cue.
          example: 20
        width:
          type: integer
          description: Width of a single tile in pixels.
          example: 320
        height:
          type: integer
          description: Height of a single tile in pixels.
          example: 180
        coords:
          $ref: '#/components/schemas/StoryboardCoords'

paths:
  # ── Videos ──────────────────────────────────────────────────────────────────

  /videos/upload:
    post:
      tags: [Videos]
      summary: Upload a video file
      description: |
        Accepts a multipart upload, stores the original in SeaweedFS, and creates
        a video record in status `pending` — transcode workers claim pending
        videos from PostgreSQL. Responds immediately with `202 Accepted`.

        **Supported formats:** `.mp4`, `.mkv`, `.mov`, `.avi`, `.webm`, `.m4v`.

        **Max file size:** configured via `MAX_UPLOAD_SIZE_GB` (default 50 GB).

        **Segments** — optionally attach a `segments` field (JSON file or raw JSON string)
        with named time intervals. Invalid JSON is rejected with `400`.
      security:
        - serviceKeyAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: Video file to upload.
                segments:
                  type: string
                  format: binary
                  description: |
                    Optional JSON file mapping segment names to `{ start, end }` intervals in seconds.
                    Example content: `{"intro":{"start":0,"end":15},"credits":{"start":3540,"end":3600}}`
      responses:
        '202':
          description: Accepted — video queued for transcoding
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadResponse'
        '400':
          description: Missing file or unsupported format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Missing or invalid service key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '413':
          description: File exceeds the configured size limit
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Storage or database error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /videos:
    get:
      tags: [Videos]
      summary: List videos
      description: |
        Returns a paginated list of videos. Public when `READ_PUBLIC=true` (default);
        requires `X-Service-Key` when `READ_PUBLIC=false`.
      security:
        - serviceKeyAuth: []
        - {}
      parameters:
        - name: page
          in: query
          description: Page number (1-based)
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: page_size
          in: query
          description: Items per page (clamped to 1–100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Video list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VideoListResponse'
        '401':
          description: Service key required but missing or invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /videos/{id}:
    get:
      tags: [Videos]
      summary: Get video details
      description: |
        Returns video metadata. When `status=ready`, includes a signed
        `manifest_url` (4 h TTL) and `preview_url`.

        Public when `READ_PUBLIC=true` (default); requires `X-Service-Key`
        when `READ_PUBLIC=false`.
      security:
        - serviceKeyAuth: []
        - {}
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Video metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Video'
        '401':
          description: Service key required but missing or invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Video not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      tags: [Videos]
      summary: Delete a video
      description: |
        Deletes the video record from the database and removes all associated files
        from storage (`originals/`, `hls/`, `thumbnails/`). File deletion is
        best-effort — the request succeeds even if some files could not be removed.

        Requires `X-Service-Key` header.
      security:
        - serviceKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Deleted successfully
        '401':
          description: Missing or invalid service key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Video not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /videos/tokens:
    post:
      tags: [Videos]
      summary: Batch-issue HLS tokens
      description: |
        Issues HLS tokens for multiple videos in a single request. Useful when a
        player needs to pre-sign several streams without making one request per video.

        The response map always contains an entry for every requested ID.
        Videos that are not found or have not yet reached `status=ready` have a `null` value.

        Maximum 100 IDs per request.

        Public when `READ_PUBLIC=true` (default); requires `X-Service-Key`
        when `READ_PUBLIC=false`.
      security:
        - serviceKeyAuth: []
        - {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ids]
              properties:
                ids:
                  type: array
                  items:
                    type: string
                    format: uuid
                  minItems: 1
                  maxItems: 100
                  example:
                    - a1b2c3d4-0000-0000-0000-000000000001
                    - a1b2c3d4-0000-0000-0000-000000000002
      responses:
        '200':
          description: Token map — null for videos that are not found or not ready
          content:
            application/json:
              schema:
                type: object
                properties:
                  tokens:
                    type: object
                    additionalProperties:
                      oneOf:
                        - $ref: '#/components/schemas/TokenResponse'
                        - type: 'null'
              example:
                tokens:
                  a1b2c3d4-0000-0000-0000-000000000001:
                    token: d6fe98fa...
                    expires: 1780237413
                    manifest_url: http://localhost/hls-proxy/a1b2c3d4.../master.m3u8?token=...
                  a1b2c3d4-0000-0000-0000-000000000002: null
        '400':
          description: Missing or invalid body, or more than 100 IDs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Service key required but missing or invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /videos/{id}/download:
    get:
      tags: [Videos]
      summary: Download original file
      description: |
        Streams the original uploaded file directly from storage.

        Requires `X-Service-Key` header.
      security:
        - serviceKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Original file stream
          headers:
            Content-Disposition:
              schema:
                type: string
                example: 'attachment; filename="original.mp4"'
            Content-Length:
              schema:
                type: integer
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '401':
          description: Missing or invalid service key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Video not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /videos/{id}/status:
    get:
      tags: [Videos]
      summary: Poll transcoding status
      description: |
        Lightweight polling endpoint. Returns status, progress and error fields only.

        Public when `READ_PUBLIC=true` (default); requires `X-Service-Key`
        when `READ_PUBLIC=false`.
      security:
        - serviceKeyAuth: []
        - {}
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Current status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '401':
          description: Service key required but missing or invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Video not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /videos/{id}/storyboard:
    get:
      tags: [Videos]
      summary: Get storyboard cues
      description: |
        Returns an array of storyboard cues for players that do not support the
        native HLS Image Stream (`EXT-X-IMAGE-STREAM-INF`).

        Each cue maps a time interval to a tile region within the sprite sheet at
        `/thumbnails/{videoID}/sprite.jpg`. Cues are computed from the sprite
        geometry the transcoder recorded for this exact video (interval, tile
        size, column count), so coordinates always match the generated sprite.

        Returns `404` if the video does not exist, has not yet reached
        `status=ready`, or has no stored storyboard (sprite generation failed).

        Public when `READ_PUBLIC=true` (default); requires `X-Service-Key`
        when `READ_PUBLIC=false`.
      security:
        - serviceKeyAuth: []
        - {}
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Array of storyboard cues
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StoryboardCue'
              example:
                - url: http://localhost/thumbnails/a1b2c3d4.../sprite.jpg
                  start_time: 0
                  end_time: 10
                  width: 320
                  height: 180
                  coords: { x: 0, y: 0 }
                - url: http://localhost/thumbnails/a1b2c3d4.../sprite.jpg
                  start_time: 10
                  end_time: 20
                  width: 320
                  height: 180
                  coords: { x: 320, y: 0 }
        '401':
          description: Service key required but missing or invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Video not found or not yet ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /videos/{id}/segments:
    get:
      tags: [Videos]
      summary: Get video segments
      description: |
        Returns the segments JSON that was uploaded alongside the video.
        Returns `404` if the video does not exist or was uploaded without segments.

        Public when `READ_PUBLIC=true` (default); requires `X-Service-Key`
        when `READ_PUBLIC=false`.
      security:
        - serviceKeyAuth: []
        - {}
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Segments map
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Segments'
        '401':
          description: Service key required but missing or invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Video not found or no segments uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ── HLS ─────────────────────────────────────────────────────────────────────

  /hls-proxy/{videoID}/{file}:
    get:
      tags: [HLS]
      summary: Serve HLS manifest
      description: |
        Fetches an HLS manifest from SeaweedFS, rewrites all embedded URLs to inject
        signed tokens, and returns the result.

        The following rewrites are applied:
        - **`EXT-X-MEDIA` URIs** (audio/subtitle sub-playlists) → `/hls-proxy/{videoID}/…`
        - **`EXT-X-STREAM-INF` variant URIs** (video quality playlists) → `/hls-proxy/{videoID}/…`
        - **`EXT-X-IMAGE-STREAM-INF` URI** (preview sprite playlist) → `/hls-proxy/{videoID}/images/index.m3u8?…`
        - **`EXT-X-MAP` URIs** (fMP4 init segments) → `/hls/{videoID}/…`
        - **Segment lines** (`.m4s`, `.jpg`, `.vtt`) → `/hls/{videoID}/…`

        The `manifest_url` returned by `GET /videos/{id}` is already signed —
        pass it directly to the player.

        ### Master manifest filters (only for `master.m3u8`)

        All three filters are optional and can be combined freely.

        | Parameter | Effect |
        |---|---|
        | `codec=h264` | Keep only renditions for the given codec (`h264`, `h265`, `av1`). Falls back to full playlist if no match. |
        | `audio=<index>` | Keep only the `EXT-X-MEDIA:TYPE=AUDIO` entry whose URI contains `audio/<index>/`. Promotes it to `DEFAULT=YES`. |
        | `subs=<index>` | Keep only the `EXT-X-MEDIA:TYPE=SUBTITLES` entry whose URI contains `subs/<index>/`. |

        Use `index` values from `audio_tracks[].index` / `subtitle_tracks[].index` returned by `GET /videos/{id}`.
      parameters:
        - name: videoID
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: file
          in: path
          required: true
          schema:
            type: string
          description: |
            Relative playlist path within the HLS tree — must end in `.m3u8`
            and contain plain path segments only (no `..`, escapes or query
            smuggling; anything else is rejected with `400`).
            Examples: `master.m3u8`, `h264/360p/index.m3u8`, `audio/0/index.m3u8`, `images/index.m3u8`
        - name: token
          in: query
          required: true
          schema:
            type: string
          description: HMAC-SHA256 token signed with `HLS_TOKEN_SECRET`
        - name: expires
          in: query
          required: true
          schema:
            type: integer
            format: int64
          description: Unix timestamp after which the token is invalid
        - name: codec
          in: query
          required: false
          schema:
            type: string
            enum: [h264, h265, av1]
          description: Filter master playlist to a single codec. Only applied to `master.m3u8`.
        - name: audio
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
          description: |
            Keep only the audio rendition at this index. Corresponds to `audio_tracks[].index`
            from `GET /videos/{id}`. Only applied to `master.m3u8`.
          example: 3
        - name: subs
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
          description: |
            Keep only the subtitle rendition at this index. Corresponds to `subtitle_tracks[].index`
            from `GET /videos/{id}`. Only applied to `master.m3u8`.
          example: 1
      responses:
        '200':
          description: HLS manifest
          content:
            application/vnd.apple.mpegurl:
              schema:
                type: string
        '400':
          description: Malformed video id or manifest path
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Token missing, invalid, or expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Manifest not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '502':
          description: Failed to fetch manifest from SeaweedFS
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /hls/{videoID}/{path}:
    get:
      tags: [HLS]
      summary: Serve HLS segment or subtitle file
      description: |
        Serves raw HLS media files from SeaweedFS. Handled by nginx — the API
        service itself does not process this path.

        nginx validates the token via `GET /internal/validate-hls` before proxying.
        Clients should not construct segment URLs manually; they are embedded in the
        rewritten manifests returned by `/hls-proxy/`.

        | File type | Example path |
        |---|---|
        | Video segment (fMP4) | `h264/720p/chunk001.m4s` |
        | fMP4 init segment | `h264/720p/init.mp4` |
        | Audio segment | `audio/0/chunk001.m4s` |
        | Image stream sprite | `images/sprite.jpg` |
        | Subtitle (WebVTT) | `subs/0/chunk001.vtt` |
      servers:
        - url: http://localhost
          description: Via nginx (port 80)
      parameters:
        - name: videoID
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: path
          in: path
          required: true
          schema:
            type: string
        - name: token
          in: query
          required: true
          schema:
            type: string
        - name: expires
          in: query
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: HLS media or subtitle data
          content:
            video/mp4:
              schema:
                type: string
                format: binary
            image/jpeg:
              schema:
                type: string
                format: binary
            text/vtt:
              schema:
                type: string
                format: binary
        '401':
          description: Token missing, invalid, or expired

  # ── Media ────────────────────────────────────────────────────────────────────

  /thumbnails/{videoID}/preview.jpg:
    get:
      tags: [Media]
      summary: Video preview image
      description: |
        A JPEG preview frame generated during transcoding. Public — no token required.
        Served by nginx directly from SeaweedFS.
      servers:
        - url: http://localhost
          description: Via nginx (port 80)
      parameters:
        - name: videoID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: JPEG preview image
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
          headers:
            Cache-Control:
              schema:
                type: string
                example: public, max-age=86400
        '404':
          description: Preview not yet generated or video does not exist

  /thumbnails/{videoID}/sprite.jpg:
    get:
      tags: [Media]
      summary: Preview sprite sheet
      description: |
        A JPEG sprite sheet with one frame every `SPRITE_INTERVAL_SECONDS` seconds
        (default 10 s), `SPRITE_COLUMNS` columns (default 10), at
        `SPRITE_WIDTH`×`SPRITE_HEIGHT` px (default 320×180) per tile.
        Generated during transcoding. Public — no token required.
        Served by nginx directly from SeaweedFS.
      servers:
        - url: http://localhost
          description: Via nginx (port 80)
      parameters:
        - name: videoID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: JPEG sprite sheet
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
          headers:
            Cache-Control:
              schema:
                type: string
                example: public, max-age=86400
        '404':
          description: Sprite not yet generated or video does not exist

  # ── Infrastructure ──────────────────────────────────────────────────────────

  /healthz:
    get:
      tags: [Internal]
      summary: Health check
      description: Returns `{"status":"ok"}` if the API and Postgres are reachable.
      responses:
        '200':
          description: Healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
        '503':
          description: Postgres unreachable

  /health:
    get:
      tags: [Internal]
      summary: nginx health check
      description: Returns `ok`. Handled by nginx, not the API service.
      servers:
        - url: http://localhost
          description: Via nginx (port 80)
      responses:
        '200':
          description: Service is up
          content:
            text/plain:
              schema:
                type: string
                example: ok

  /internal/validate-hls:
    get:
      tags: [Internal]
      summary: Validate HLS token (nginx subrequest)
      description: |
        Used exclusively by nginx via `auth_request` to validate tokens on HLS
        segment requests. Do not call this endpoint directly.
      parameters:
        - name: video_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: token
          in: query
          required: true
          schema:
            type: string
        - name: expires
          in: query
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Token valid
        '401':
          description: Token invalid or expired
