worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;
    keepalive_timeout 65;
    gzip off;

    # Docker's embedded DNS. Upstreams are referenced through variables (below) so
    # nginx re-resolves them per request via this resolver instead of caching the
    # IP once at startup — otherwise a container restart (reboot, recreate) leaves
    # nginx pinned to a dead IP and every request 502s until nginx is restarted.
    resolver 127.0.0.11 valid=10s ipv6=off;

    map $uri $hls_content_type {
        default application/octet-stream;
        ~\.ts$ video/mp2t;
        ~\.(m4s|mp4)$ video/mp4;
        ~\.jpe?g$ image/jpeg;
        ~\.vtt$ text/vtt;
    }

    server {
        listen 80;
        server_name _;

        # Upstream targets as variables so proxy_pass goes through the resolver.
        set $api_backend     "api:8000";
        set $seaweed_backend "seaweedfs-filer:8888";
        set $swagger_backend "swagger-ui:8080";

        # API proxy (all /api/* → Go)
        location /api/ {
            rewrite ^/api/(.*) /$1 break;
            proxy_pass http://$api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 3600;
            proxy_send_timeout 3600;
            proxy_request_buffering off;
            client_max_body_size 0;
        }

        # HLS manifest proxy — the API rewrites URLs and injects tokens.
        # CORS headers come from the API's CORSMiddleware — not duplicated here.
        location /hls-proxy/ {
            proxy_pass http://$api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # HLS segments — nginx serves straight from SeaweedFS after validating
        # the token. Covers .ts, .m4s, init.mp4, HLS image-stream .jpg and .vtt.
        # Path: /hls/<videoID>/<codec>/<quality>/<file>?token=...&expires=...
        location ~ ^/hls/([^/]+)/(.+\.(ts|m4s|mp4|jpe?g|vtt))$ {
            # Capture what the auth subrequest needs BEFORE auth_request runs;
            # nginx propagates set{} variables into subrequests.
            set $hls_video_id $1;
            set $hls_token    $arg_token;
            set $hls_expires  $arg_expires;

            auth_request /internal/validate-hls-chunk;

            proxy_pass http://$seaweed_backend/hls/$1/$2;
            proxy_set_header Host seaweedfs-filer;
            proxy_hide_header Content-Type;
            proxy_hide_header Access-Control-Allow-Origin;

            add_header Content-Type $hls_content_type always;
            add_header Cache-Control "public, max-age=3600";
            add_header Access-Control-Allow-Origin "*";
        }

        # Internal token-validation endpoint for segment requests.
        # video_id, token and expires arrive via the variables set above.
        location = /internal/validate-hls-chunk {
            internal;
            # $hls_video_id, $hls_token, $hls_expires come from the parent location
            proxy_pass http://$api_backend/internal/validate-hls?video_id=$hls_video_id&token=$hls_token&expires=$hls_expires;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Thumbnails — public, no token required.
        location ~ ^/thumbnails/(.+)$ {
            proxy_pass http://$seaweed_backend/thumbnails/$1;
            proxy_hide_header Access-Control-Allow-Origin;
            add_header Cache-Control "public, max-age=86400";
            add_header Access-Control-Allow-Origin "*";
        }

        location /swagger/ {
            proxy_pass http://$swagger_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /health {
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }
}
