version: "2"

linters:
  default: standard
  settings:
    errcheck:
      exclude-functions:
        - (io.Closer).Close
        - (io.ReadCloser).Close
        - (*os.File).Close
        - (mime/multipart.File).Close
  enable:
    - misspell
    - nolintlint
    - unconvert
    - whitespace

formatters:
  enable:
    - gofmt
